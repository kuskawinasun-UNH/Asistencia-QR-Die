<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia QR</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
margin:0;
font-family:Arial;
background:url('unh-fondo.jpg') no-repeat center center fixed;
background-size:cover;
}

.header{
background:#78b8e5;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header img{height:50px;}

.container{
max-width:420px;
margin:auto;
background:rgba(255,255,255,0.95);
margin-top:20px;
padding:20px;
border-radius:12px;
}

#reader{width:100%;margin:10px 0;}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#78b8e5;
color:white;
border:none;
font-weight:bold;
cursor:pointer;
}

#employee-info{
display:none;
background:#eef6fb;
padding:10px;
border-radius:8px;
}

#respuesta{
display:none;
margin-top:10px;
padding:10px;
border-radius:8px;
text-align:center;
}

.success{background:#d4edda;color:#155724;}
.error{background:#f8d7da;color:#721c24;}
</style>
</head>

<body>

<div class="header">
<img src="logo.png">
<h3>REGISTRO DE ASISTENCIA UNH</h3>
<img src="logo-unh.png">
</div>

<div class="container">

<button onclick="iniciarQR()">📷 Activar Cámara</button>
<button onclick="detenerQR()">⛔ Detener Cámara</button>

<div id="reader"></div>

<input type="text" id="idInput" placeholder="Ingrese ID">

<button onclick="buscarManual()">🔍 Buscar</button>

<div id="employee-info">
<p><b>Nombre:</b> <span id="nombre"></span></p>
<p><b>Área:</b> <span id="area"></span></p>
<p><b>Cargo:</b> <span id="cargo"></span></p>
</div>

<select id="estado">
<option value="INGRESO">INGRESO</option>
<option value="SALIDA">SALIDA</option>
</select>

<button onclick="registrar()">Registrar</button>

<div id="respuesta"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxaCInZHVKDP9k2xZFJQAwS33Xd9tWzDUgokiekMAcoT-6Wc7uIYp0KmHEteLtlE7RilQ/exec";

let employeeData = null;
let scanner = null;

// ACTIVAR CAMARA
function iniciarQR(){
scanner = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices=>{
if(devices.length){
scanner.start(
devices[0].id,
{fps:10,qrbox:250},
(qr)=>{
document.getElementById("idInput").value = qr;
buscar(qr);
}
);
}
}).catch(()=>mostrar("No se pudo activar cámara","error"));
}

// DETENER
function detenerQR(){
if(scanner){
scanner.stop().then(()=>{
document.getElementById("reader").innerHTML="";
});
}
}

// BUSCAR
function buscarManual(){
const id = document.getElementById("idInput").value.trim();
if(!id){
mostrar("Ingrese ID","error");
return;
}
buscar(id);
}

function buscar(id){
fetch(API_URL,{
method:"POST",
body:JSON.stringify({id:id,estado:"CONSULTA"})
})
.then(r=>r.json())
.then(d=>{
if(d.exito){
employeeData = d;
document.getElementById("employee-info").style.display="block";
nombre.textContent = d.nombre;
area.textContent = d.area;
cargo.textContent = d.cargo;
}else{
mostrar(d.mensaje,"error");
}
});
}

// REGISTRAR
function registrar(){
if(!employeeData){
mostrar("Primero busca empleado","error");
return;
}

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
id:document.getElementById("idInput").value,
estado:document.getElementById("estado").value
})
})
.then(r=>r.json())
.then(d=>{
if(d.exito){
mostrar(`✅ ${d.nombre} - ${d.hora}`,"success");
employeeData=null;
document.getElementById("employee-info").style.display="none";
document.getElementById("idInput").value="";
}else{
mostrar(d.mensaje,"error");
}
});
}

// MENSAJE
function mostrar(msg,tipo){
const div = document.getElementById("respuesta");
div.innerText = msg;
div.className = tipo;
div.style.display="block";
}

</script>

</body>
</html>
