<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Asistencia QR</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  margin:0;
}

.container {
  max-width:400px;
  margin:auto;
  background:#fff;
  margin-top:20px;
  padding:20px;
  border-radius:10px;
}

h1 { text-align:center; }

#reader {
  width:100%;
  margin-bottom:15px;
}

input, select, button {
  width:100%;
  padding:10px;
  margin-top:10px;
}

#respuesta {
  margin-top:15px;
  padding:10px;
  display:none;
  border-radius:6px;
  text-align:center;
}

.success { background:#d4edda; color:#155724;}
.error { background:#f8d7da; color:#721c24;}
</style>
</head>

<body>

<div class="container">

<h1>📷 Asistencia QR</h1>

<div id="reader"></div>

<input type="text" id="id" placeholder="ID del alumno">

<div id="info" style="display:none;">
<p><b>Nombre:</b> <span id="nombre"></span></p>
<p><b>Área:</b> <span id="area"></span></p>
<p><b>Cargo:</b> <span id="cargo"></span></p>
</div>

<select id="estado">
<option value="INGRESO">INGRESO</option>
<option value="SALIDA">SALIDA</option>
</select>

<button onclick="registrar()">Registrar</button>

<div id="respuesta"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyFoMvpFdVs9uUP3C-TIlqx5dl0nlwFx5lMGfX8bZ_JO9yJ2oyrcJoTj95JcbyP2QMRIQ/exec";

let employeeData = null;

// 🚀 INICIAR QR
function iniciarQR(){
  const html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {
    if(devices.length){
      html5QrCode.start(
        devices[0].id,
        { fps:10, qrbox:250 },
        qrCodeMessage => {
          document.getElementById("id").value = qrCodeMessage;
          buscarEmpleado(qrCodeMessage);
        }
      );
    }
  });
}

// 🔍 BUSCAR
function buscarEmpleado(id){

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      id:id,
      estado:"CONSULTA"
    })
  })
  .then(res=>res.json())
  .then(data=>{

    if(data.exito){
      employeeData = data;

      document.getElementById("info").style.display="block";
      document.getElementById("nombre").textContent=data.nombre;
      document.getElementById("area").textContent=data.area;
      document.getElementById("cargo").textContent=data.cargo;

    }else{
      mostrar("❌ No encontrado","error");
      document.getElementById("info").style.display="none";
    }

  });
}

// 📝 REGISTRAR
function registrar(){

  const id = document.getElementById("id").value;
  const estado = document.getElementById("estado").value;

  if(!employeeData){
    mostrar("❌ Busca primero el empleado","error");
    return;
  }

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      id:id,
      estado:estado
    })
  })
  .then(res=>res.json())
  .then(data=>{

    if(data.exito){
      mostrar(`✅ ${data.nombre} registrado ${data.hora}`,"success");

      document.getElementById("id").value="";
      document.getElementById("info").style.display="none";
      employeeData=null;

    }else{
      mostrar(data.mensaje,"error");
    }

  });
}

// 📢 MENSAJE
function mostrar(msg,tipo){
  const div = document.getElementById("respuesta");
  div.innerText = msg;
  div.className = tipo;
  div.style.display="block";
}

// AUTO BUSCAR AL ESCRIBIR
document.getElementById("id").addEventListener("input",function(){
  if(this.value.length>2){
    buscarEmpleado(this.value);
  }
});

// INICIAR
iniciarQR();

</script>

</body>
</html>
