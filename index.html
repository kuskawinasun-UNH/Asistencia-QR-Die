<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia QR - UNH</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
}

/* IZQUIERDA */
.left {
    width: 35%;
    background: #78b8e5;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* LOGOS */
.logo-unh {
    width: 230px;
    animation: fadeZoom 1s ease;
}

.logo-secundario {
    width: 200px;
    margin-top: 10px;
    animation: fadeZoom 1.5s ease;
}

/* DERECHA */
.right {
    width: 65%;
    background: #f5f6fa;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* TARJETA */
.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 350px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    animation: slideUp 1s ease;
}

/* QR */
#qr {
    margin-top: 15px;
}

/* INPUT */
#qr-input {
    margin-top: 10px;
}

/* RESULTADO */
#resultado {
    margin-top: 15px;
    font-weight: bold;
}

/* ANIMACIONES */
@keyframes fadeZoom {
    from {opacity:0; transform:scale(0.8);}
    to {opacity:1; transform:scale(1);}
}

@keyframes slideUp {
    from {opacity:0; transform:translateY(40px);}
    to {opacity:1; transform:translateY(0);}
}
</style>

</head>

<body>

<!-- IZQUIERDA -->
<div class="left">
    <img src="logo-unh.png" class="logo-unh">
    <img src="logo.png" class="logo-secundario">
</div>

<!-- DERECHA -->
<div class="right">
    <div class="card">

        <h2>Control de Asistencia</h2>

        <!-- MÉTODO 1 -->
        <p>📷 Escanea este QR con tu celular</p>
        <div id="qr"></div>

        <hr>

        <!-- MÉTODO 2 -->
        <p>🖼️ O sube tu código QR</p>
        <input type="file" id="qr-input" accept="image/*">

        <p id="resultado">Esperando acción...</p>

    </div>
</div>

<!-- LIBRERÍA GENERAR QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- LIBRERÍA LEER QR -->
<script src="https://unpkg.com/html5-qrcode"></script>

<script>

// 🔥 CAMBIA TU DOMINIO
let actividadURL = "https://TU-DOMINIO.com/registro-asistencia/?act=ACT001";

// GENERAR QR (pantalla)
new QRCode(document.getElementById("qr"), {
    text: actividadURL,
    width: 250,
    height: 250
});

const resultado = document.getElementById("resultado");

// =======================
// 🖼️ MÉTODO: SUBIR IMAGEN
// =======================
document.getElementById("qr-input").addEventListener("change", function(e){

    const file = e.target.files[0];
    if (!file) return;

    const html5QrCode = new Html5Qrcode("qr");

    html5QrCode.scanFile(file, true)
    .then(decodedText => {

        resultado.innerHTML = "⏳ Registrando...";

        fetch("https://TU-DOMINIO.com/wp-json/asistencia/v1/guardar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                id: decodedText,
                actividad: "ACT001"
            })
        })
        .then(res => res.json())
        .then(data => {
            if(data.ok){
                resultado.style.color = "green";
                resultado.innerHTML = "✅ " + data.nombre;
            } else {
                resultado.style.color = "red";
                resultado.innerHTML = "❌ " + data.error;
            }
        });

    })
    .catch(() => {
        resultado.style.color = "red";
        resultado.innerHTML = "❌ No se pudo leer el QR";
    });

});
</script>

</body>
</html>
