<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Asistencia QR</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    /* 🔥 TODO TU DISEÑO ORIGINAL SIN CAMBIOS */
    :root {
      --primary: #4CAF50;
      --primary-dark: #45a049;
      --secondary: #2196F3;
      --secondary-dark: #1976D2;
      --success: #d4edda;
      --success-text: #155724;
      --error: #f8d7da;
      --error-text: #721c24;
      --warning: #fff3cd;
      --warning-text: #856404;
      --bg-main: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --shadow: 0 4px 20px rgba(0,0,0,0.15);
      --border-radius: 12px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin:0; padding:0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-main);
      min-height: 100vh;
      padding: 10px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
    }

    .header {
      background: var(--primary);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .content { padding: 20px; }

    #reader { width:100%; margin-bottom:20px; }

    input, select {
      width:100%;
      padding:10px;
      margin-bottom:10px;
    }

    button {
      width:100%;
      padding:12px;
      background:var(--primary);
      color:white;
      border:none;
      cursor:pointer;
    }

    #respuesta { margin-top:10px; text-align:center; }
  </style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>🕐 REGISTRO DE ASISTENCIA DIE</h1>
  <p>Escanea tu código QR o ingresa tu ID</p>
</div>

<div class="content">

<div id="reader"></div>

<input type="text" id="id" placeholder="Ingrese ID">

<div id="employee-info" style="display:none;">
  <p id="employee-name"></p>
  <p id="employee-area"></p>
  <p id="employee-position"></p>
</div>

<select id="estado">
  <option value="INGRESO">INGRESO</option>
  <option value="SALIDA">SALIDA</option>
</select>

<button id="btn-submit">Registrar</button>

<div id="respuesta"></div>

</div>
</div>

<script>

// 🔴 TU URL DE APPS SCRIPT
const API_URL = "https://script.google.com/macros/s/AKfycbygKAyfhlSsJ878flQEdhfxS7M4Mgx8GHIFdnErn_a4gMGrgNPgfIKVkFMcJ1tvKvjK/exec";

let employeeData = null;

// ---------------- QR
function iniciarQR(){
  const qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps:10, qrbox:250 },
    (text)=>{
      document.getElementById("id").value = text;
      buscarEmpleado(text);
    }
  );
}

iniciarQR();

// ---------------- BUSCAR EMPLEADO
async function buscarEmpleado(id){

  if(!id.trim()) return;

  const res = await fetch(`${API_URL}?accion=buscar&id=${id}`);
  const resultado = await res.json();

  if (resultado.encontrado) {
    employeeData = resultado.datos;

    document.getElementById('employee-info').style.display = 'block';
    document.getElementById('employee-name').textContent = resultado.datos.nombre;
    document.getElementById('employee-area').textContent = resultado.datos.area;
    document.getElementById('employee-position').textContent = resultado.datos.cargo;

  } else {
    employeeData = null;
    document.getElementById('employee-info').style.display = 'none';
    mostrarRespuesta("Empleado no encontrado", "orange");
  }
}

// ---------------- REGISTRAR
async function registrarAsistencia(){

  const id = document.getElementById("id").value;
  const estado = document.getElementById("estado").value;

  if(!employeeData){
    mostrarRespuesta("Ingrese un ID válido", "red");
    return;
  }

  const res = await fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      accion:"registrar",
      id:id,
      nombre:employeeData.nombre,
      area:employeeData.area,
      cargo:employeeData.cargo,
      estado:estado
    })
  });

  const resultado = await res.json();

  if (resultado.exito) {
    mostrarRespuesta(`✅ ${estado} registrado a las ${resultado.hora}`, "green");
  } else {
    mostrarRespuesta(resultado.mensaje, "orange");
  }
}

// ---------------- UI
function mostrarRespuesta(msg,color){
  const r = document.getElementById("respuesta");
  r.innerText = msg;
  r.style.color = color;
}

// ---------------- EVENTOS
document.getElementById("btn-submit")
  .addEventListener("click", registrarAsistencia);

document.getElementById("id")
  .addEventListener("input", function(){
    buscarEmpleado(this.value);
  });

</script>

</body>
</html>
