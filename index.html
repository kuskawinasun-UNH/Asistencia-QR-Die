<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia QR - UNH</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
}

/* IZQUIERDA */
.left {
    width: 35%;
    background: #78b8e5;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center; 
    padding: 20px;
}

/* LOGOS */
.logos {
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeZoom 1s ease;
}

.logo-unh {
    width: 220px;
    margin-bottom: 10px;
}

.logo-secundario {
    width: 180px;
}

/* TEXTOS */
.left h1 { font-size: 16px; margin: 5px; }
.left h2 { font-size: 24px; margin: 5px; }

/* DERECHA */
.right {
    width: 65%;
    background: #f5f6fa;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* TARJETA */
.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    animation: slideUp 1s ease;
}

/* CAJAS */
.box {
    margin-top: 15px;
    padding: 10px;
    border-radius: 10px;
    background: #f8f9fb;
}

/* SCANNER */
#reader {
    width: 100% !important;
    max-width: 250px;
    margin: auto;
}

/* BOTONES DEL SCANNER */
#reader button, #reader select {
    font-size: 12px;
    padding: 4px;
}

/* INPUT */
#qr-input {
    margin-top: 10px;
}

/* RESULTADO */
#resultado {
    margin-top: 15px;
    font-weight: bold;
}

/* ANIMACIONES */
@keyframes fadeZoom {
    from {opacity:0; transform:scale(0.8);}
    to {opacity:1; transform:scale(1);}
}

@keyframes slideUp {
    from {opacity:0; transform:translateY(40px);}
    to {opacity:1; transform:translateY(0);}
}
</style>

</head>

<body>

<!-- IZQUIERDA -->
<div class="left">
    <div class="logos">
        <img src="logo-unh.png" class="logo-unh">
        <img src="logo.png" class="logo-secundario">
    </div>

    <h1>UNIVERSIDAD NACIONAL DE</h1>
    <h2>HUANCAVELICA</h2>
    <h2>CONTROL DE ASISTENCIA</h2>
</div>

<!-- DERECHA -->
<div class="right">
    <div class="card">

        <h2>Registrar Asistencia</h2>

        <!-- CÁMARA -->
        <div class="box">
            <h3>📷 Cámara</h3>
            <div id="reader"></div>
        </div>

        <!-- IMAGEN -->
        <div class="box">
            <h3>🖼️ Subir QR</h3>
            <input type="file" id="qr-input" accept="image/*">
        </div>

        <p id="resultado">Esperando acción...</p>

    </div>
</div>

<!-- LIBRERÍA -->
<script src="https://unpkg.com/html5-qrcode"></script>

<script>

const resultado = document.getElementById("resultado");

// 🔥 FUNCIÓN PRINCIPAL
function registrarAsistencia(codigo) {
    resultado.innerHTML = "Código leído: " + codigo;
}

// =======================
// 📷 CÁMARA
// =======================
function onScanSuccess(decodedText) {
    registrarAsistencia(decodedText);
}

let scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: { width: 200, height: 200 }
});

scanner.render(onScanSuccess);


// =======================
// 🖼️ IMAGEN
// =======================
const qrInput = document.getElementById("qr-input");

qrInput.addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;

    scanner.clear(); // 🔥 evita conflicto

    const html5QrCode = new Html5Qrcode("reader");

    html5QrCode.scanFile(file, true)
    .then(decodedText => {
        registrarAsistencia(decodedText);
    })
    .catch(err => {
        resultado.innerHTML = "❌ No se pudo leer el QR";
    });
});

</script>

</body>
</html>
