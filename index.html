<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Asistencia QR</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#667eea,#764ba2);
      margin:0;
      padding:20px;
    }
    .container{
      max-width:400px;
      margin:auto;
      background:#fff;
      border-radius:10px;
      padding:20px;
    }
    h1{text-align:center;color:#4CAF50;}
    input,select,button{
      width:100%;
      padding:10px;
      margin-top:10px;
    }
    button{
      background:#4CAF50;
      color:#fff;
      border:none;
      cursor:pointer;
    }
    #reader{margin-top:15px;}
    #respuesta{margin-top:15px;text-align:center;font-weight:bold;}
  </style>
</head>

<body>
<div class="container">

<h1>🕐 Asistencia QR</h1>

<div id="reader"></div>

<input type="text" id="id" placeholder="ID Empleado">

<select id="estado">
  <option value="INGRESO">INGRESO</option>
  <option value="SALIDA">SALIDA</option>
</select>

<button onclick="registrarAsistencia()">Registrar</button>

<div id="info"></div>
<div id="respuesta"></div>

</div>

<script>

// 🔴 PON TU URL AQUÍ
const API_URL = "https://script.google.com/macros/s/AKfycbxaCInZHVKDP9k2xZFJQAwS33Xd9tWzDUgokiekMAcoT-6Wc7uIYp0KmHEteLtlE7RilQ/exec";

let employeeData = null;

// ---------------- QR
function iniciarQR(){
  const qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps:10, qrbox:250 },
    (text)=>{
      document.getElementById("id").value = text;
      buscarEmpleado(text);
    }
  );
}

iniciarQR();

// ---------------- BUSCAR
async function buscarEmpleado(id){
  const res = await fetch(`${API_URL}?accion=buscar&id=${id}`);
  const data = await res.json();

  if(data.encontrado){
    employeeData = data.datos;

    document.getElementById("info").innerHTML =
      `<b>${data.datos.nombre}</b><br>${data.datos.area} - ${data.datos.cargo}`;
  }else{
    document.getElementById("info").innerHTML = "No encontrado";
  }
}

// ---------------- REGISTRAR
async function registrarAsistencia(){

  const id = document.getElementById("id").value;
  const estado = document.getElementById("estado").value;

  if(!employeeData){
    mostrar("Busca empleado primero","red");
    return;
  }

  const res = await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      accion:"registrar",
      id:id,
      nombre:employeeData.nombre,
      area:employeeData.area,
      cargo:employeeData.cargo,
      estado:estado
    })
  });

  const data = await res.json();

  if(data.exito){
    mostrar("✅ Registrado correctamente","green");
  }else{
    mostrar(data.mensaje,"orange");
  }
}

// ---------------- UI
function mostrar(msg,color){
  const r = document.getElementById("respuesta");
  r.innerText = msg;
  r.style.color = color;
}

</script>
</body>
</html>
