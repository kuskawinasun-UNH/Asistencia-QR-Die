<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia QR - UNH</title>

<style>
    .logos {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 20px;
}

.logo-unh {
    width: 180px; /* grande */
    margin-bottom: 10px;
}

.logo-secundario {
    width: 140px; /* más pequeño */
}
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
}

/* LADO IZQUIERDO */
.left {
    width: 35%;
    background: #78b8e5;
    color: #1a1a1a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    text-align: center;
}

.left img {
    width: 220px;
    display: block;
    margin: 0 auto 20px auto;
}

.left h1 {
    font-size: 18px;
    margin: 5px 0;
}

.left h2 {
    font-size: 26px;
    margin: 10px 0;
}

.left p {
    font-size: 14px;
}

/* LADO DERECHO */
.right {
    width: 65%;
    background: #f5f6fa;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* TARJETA QR */
.card {
    background: white;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

#qr {
    margin-top: 15px;
}

.status {
    margin-top: 10px;
    color: gray;
}
</style>

</head>

<body>

<!-- IZQUIERDA -->
<div class="logos">
    <img src="logo-unh.png" class="logo-unh">
    <img src="logo.png" class="logo-secundario">
    <h1>UNIVERSIDAD NACIONAL DE</h1>
    <h2>HUANCAVELICA</h2>
    <h2>CONTROL DE ASISTENCIA</h2>
    <p>Escanea el código QR para registrar tu asistencia</p>
</div>

<!-- DERECHA -->
<div class="right">
    <div class="card">
        <h2>Escanear Código QR</h2>
        <p>Muestra este código a los participantes</p>

        <div id="qr"></div>

        <p class="status">Código activo</p>
    </div>
</div>

<!-- LIBRERÍA QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
// 🔥 CAMBIA ESTE LINK POR TU DOMINIO WORDPRESS
let codigoActividad = "https://TU-DOMINIO.com/registro-asistencia/?actividad=ACT001";

// Generar QR
new QRCode(document.getElementById("qr"), {
    text: codigoActividad,
    width: 250,
    height: 250
});
</script>

</body>
</html>
