<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asistencia QR</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.header{
background:#78b8e5;
color:white;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
}

.header img{
height:50px;
}

.container{
max-width:420px;
margin:auto;
background:white;
margin-top:20px;
padding:20px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

#reader{
width:100%;
margin:15px 0;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#78b8e5;
color:white;
border:none;
font-weight:bold;
}

#employee-info{
display:none;
background:#eef6fb;
padding:10px;
margin-top:10px;
border-radius:8px;
}

#respuesta{
display:none;
margin-top:15px;
padding:10px;
border-radius:8px;
text-align:center;
}

.success{background:#d4edda;color:#155724;}
.error{background:#f8d7da;color:#721c24;}

.toggle{
margin-top:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
<img src="logo-unh.png">
<h3>SISTEMA DE CONTROL DE REGISTRO</h3>
<img src="logo.png">
</div>

<div class="container">

<div class="toggle">
<label>
<input type="checkbox" id="toggleCam" checked> Cámara activa
</label>
</div>

<div id="reader"></div>

<input type="text" id="id" placeholder="ID">

<div id="employee-info">
<p><b>Nombre:</b> <span id="nombre"></span></p>
<p><b>Área:</b> <span id="area"></span></p>
<p><b>Cargo:</b> <span id="cargo"></span></p>
</div>

<select id="estado">
<option value="INGRESO">INGRESO</option>
<option value="SALIDA">SALIDA</option>
</select>

<button onclick="registrar()">Registrar</button>

<div id="respuesta"></div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbxaCInZHVKDP9k2xZFJQAwS33Xd9tWzDUgokiekMAcoT-6Wc7uIYp0KmHEteLtlE7RilQ/exec";

let employeeData=null;
let scanner=null;
let camActiva=true;

// QR
function iniciarQR(){
if(!camActiva) return;

scanner=new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices=>{
if(devices.length){
scanner.start(devices[0].id,{fps:10,qrbox:250},qr=>{
document.getElementById("id").value=qr;
buscar(qr);
});
}
});
}

function detenerQR(){
if(scanner){
scanner.stop();
}
}

// Toggle cámara
document.getElementById("toggleCam").addEventListener("change",function(){
camActiva=this.checked;
if(camActiva){
iniciarQR();
}else{
detenerQR();
document.getElementById("reader").innerHTML="";
}
});

// Buscar
function buscar(id){
fetch(API_URL,{
method:"POST",
body:JSON.stringify({id:id,estado:"CONSULTA"})
})
.then(r=>r.json())
.then(d=>{
if(d.exito){
employeeData=d;
document.getElementById("employee-info").style.display="block";
nombre.textContent=d.nombre;
area.textContent=d.area;
cargo.textContent=d.cargo;
}else{
mostrar("No encontrado","error");
}
});
}

// Registrar
function registrar(){
if(!employeeData){
mostrar("Busca primero","error");
return;
}

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
id:document.getElementById("id").value,
estado:document.getElementById("estado").value
})
})
.then(r=>r.json())
.then(d=>{
if(d.exito){
mostrar(`✅ ${d.nombre} - ${d.hora}`,"success");
employeeData=null;
document.getElementById("employee-info").style.display="none";
document.getElementById("id").value="";
}else{
mostrar(d.mensaje,"error");
}
});
}

// Mensajes
function mostrar(msg,tipo){
let div=document.getElementById("respuesta");
div.innerText=msg;
div.className=tipo;
div.style.display="block";
}

// Auto buscar
document.getElementById("id").addEventListener("input",function(){
if(this.value.length>2) buscar(this.value);
});

iniciarQR();

</script>

</body>
</html>
