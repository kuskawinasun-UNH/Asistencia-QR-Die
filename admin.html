<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin</title>
</head>
<body style="font-family: Arial; text-align:center; padding:40px;">

<h2>⚙ Panel Admin</h2>

<p>Actividad actual:</p>
<h3 id="actual">Cargando...</h3>

<input type="text" id="actividad" placeholder="Nueva actividad">
<br><br>
<button onclick="guardar()">Guardar</button>

<script>
const URL = "https://script.google.com/macros/s/AKfycbygKAyfhlSsJ878flQEdhfxS7M4Mgx8GHIFdnErn_a4gMGrgNPgfIKVkFMcJ1tvKvjK/exec"; // 👈 IMPORTANTE

// 🔐 contraseña simple
const pass = prompt("🔐 Contraseña:");
if (pass !== "admin123") {
  alert("❌ Acceso denegado");
  document.body.innerHTML = "";
}

// 📥 obtener actividad
function cargar() {
  fetch(URL + "?action=getActividad")
    .then(r => r.json())
    .then(data => {
      document.getElementById("actual").innerText = data.actividad;
    });
}

// 💾 guardar actividad
function guardar() {
  const actividad = document.getElementById("actividad").value;

  fetch(URL, {
    method: "POST",
    body: JSON.stringify({
      action: "setActividad",
      actividad: actividad,
      clave: pass
    })
  })
  .then(r => r.json())
  .then(res => {
    if (res.ok) {
      alert("✅ Guardado");
      cargar();
    } else {
      alert("❌ " + res.mensaje);
    }
  });
}

cargar();
</script>

</body>
</html>
